<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>হুম কিছু তো আছে 🤔</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Poppins", sans-serif;
      background: radial-gradient(circle at top, #ffe0f2, #ffeff7, #ffe4f0);
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      opacity: 1;
    }

    /* Soft confetti dots */
    .confetti-dot {
      position: absolute;
      border-radius: 999px;
      opacity: 0.7;
      filter: blur(1px);
      animation: floatUp 12s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(20px) scale(1);
        opacity: 0;
      }
      20% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(-120vh) scale(1.1);
        opacity: 0;
      }
    }

    /* Smooth fade when leaving */
    .fade-out {
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
    }

    /* Glow animation on card */
    .card-glow {
      box-shadow:
        0 18px 45px rgba(255, 126, 179, 0.32),
        0 0 0 1px rgba(255, 180, 210, 0.4);
    }

    /* Pulse on button */
    .pulse-ring {
      position: absolute;
      inset: -4px;
      border-radius: 999px;
      border: 2px solid rgba(255, 188, 214, 0.6);
      animation: pulse 1.8s ease-out infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.9);
        opacity: 0.9;
      }
      100% {
        transform: scale(1.2);
        opacity: 0;
      }
    }
  </style>
</head>
<body class="flex items-center justify-center px-4">

  <!-- Floating confetti (simple circles) -->
  <span class="confetti-dot" style="width:12px;height:12px;background:#ff9fc7;left:8%;animation-delay:0s;"></span>
  <span class="confetti-dot" style="width:8px;height:8px;background:#ffcce5;left:25%;animation-delay:2s;"></span>
  <span class="confetti-dot" style="width:10px;height:10px;background:#ffb3cf;left:42%;animation-delay:4s;"></span>
  <span class="confetti-dot" style="width:7px;height:7px;background:#ffd7f2;left:63%;animation-delay:1s;"></span>
  <span class="confetti-dot" style="width:11px;height:11px;background:#ff91c1;left:82%;animation-delay:3s;"></span>

  <!-- Card -->
  <div class="relative w-full max-w-md bg-white/95 rounded-[28px] border-[3px] border-[#ff9fc7] card-glow p-5 md:p-6 backdrop-blur-[2px] overflow-hidden">

    <!-- Tiny floating balloons in corner -->
    <div class="absolute -top-4 -right-1 flex flex-col items-center gap-1 rotate-3 pointer-events-none">
      <div class="w-7 h-9 rounded-full bg-gradient-to-b from-[#ffe0f5] to-[#ff9fc7] shadow-md"></div>
      <div class="w-[1px] h-6 bg-[#ff9fc7]/70"></div>
    </div>

    <!-- Header strip -->
    <div class="w-full flex justify-center mb-4">
      <div class="inline-flex items-center gap-2 bg-gradient-to-r from-[#ff9fc7] to-[#ff7fb3] rounded-full px-5 py-2 text-white text-sm font-semibold tracking-wide shadow-sm">
        <span>হুম তোমার জন্যই অপেক্ষা করছিলাম</span>
        <span class="text-lg">💞</span>
      </div>
    </div>

    <!-- Sub heading -->
    <div class="text-center mb-4">
      <p class="text-xs uppercase tracking-[0.3em] text-[#ff7fb3] font-semibold mb-1">
         কি রেডি ? 
      </p>
      <p class="text-lg md:text-xl font-semibold text-gray-800">
        অনেক অপেক্ষার পর ✨
      </p>
    </div>

    <!-- Image slider -->
    <div class="relative rounded-3xl overflow-hidden border-2 border-[#4b4b4b] mb-4 bg-[#ffd5e8] shadow-inner">
      <!-- Main image (will be replaced by JS from images[0]) -->
      <img
        id="mainImage"
        src="pic3.jpg"
        alt="Cute birthday card"
        class="w-full h-56 object-cover md:h-60"
      />

      <!-- Gradient overlay bottom -->
      <div class="absolute inset-x-0 bottom-0 h-16 bg-gradient-to-t from-black/40 to-transparent pointer-events-none"></div>

      <!-- Left arrow -->
      <button
        id="prevBtn"
        class="absolute left-2 top-1/2 -translate-y-1/2 bg-white/90 rounded-full w-8 h-8 flex items-center justify-center text-sm font-semibold shadow-md hover:scale-110 hover:bg-white transition"
        aria-label="Previous image"
      >
        ‹
      </button>

      <!-- Right arrow -->
      <button
        id="nextBtn"
        class="absolute right-2 top-1/2 -translate-y-1/2 bg-white/90 rounded-full w-8 h-8 flex items-center justify-center text-sm font-semibold shadow-md hover:scale-110 hover:bg-white transition"
        aria-label="Next image"
      >
        ›
      </button>

      <!-- Tiny slider caption -->
      <div class="absolute bottom-2 left-1/2 -translate-x-1/2 text-[11px] text-white/90 font-medium px-3 py-1 rounded-full bg-black/35 backdrop-blur">
         কিছু আছে খুঁজে দেখো পাও কি না 😁 💗
      </div>
    </div>

    <!-- Description text -->
    <p class="text-center text-xs md:text-sm text-gray-700 mb-4 leading-relaxed">
      দেখো 🥰 <span class="font-semibold"> </span> — তোমার সাথে কাটানো প্রতিটি সময় আমার এক রুপ কথার মতো ছিল। তুমি আমার জীবনের এক রুপ কথার গল্প☺️💕
    </p>

    <!-- Second line -->
    <p class="text-center text-[11px] md:text-xs text-gray-500 mb-5 leading-relaxed">
      নিচে বাটনে চাপ দাও আরো মজার জিনিস আছে 🥰 ✨
    </p>

    <!-- Tap button -->
    <div class="flex justify-center mb-3 relative">
      <button
        id="tapButton"
        class="relative bg-gradient-to-r from-[#ff9fc7] to-[#ff7fb3] text-white text-sm font-semibold px-8 py-2.5 rounded-full border border-[#ff7fb3] shadow-md hover:shadow-lg hover:-translate-y-0.5 active:scale-95 transition-all"
      >
        <span class="pulse-ring pointer-events-none"></span>
        শুধু তোমার জন্য 🥰 ✨
      </button>
    </div>

    <!-- Tiny note under button -->
    <p class="text-center text-[11px] text-gray-500 mb-2">
      ( 100% Cuteness 😁)
    </p>

    <!-- Footer note -->
    <p class="text-center text-[11px] text-gray-400">
      প্রিয়😺 💌
    </p>
  </div>

  <script>
    // ---------- IMAGE SLIDER ----------
    const images = [
     
      "pic1.jpg",
      "pic2.jpg",
      "pic3.jpg",
      "pic4.jpg",
     
    ];

    let currentIndex = 0;
    const mainImage = document.getElementById("mainImage");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function updateImage() {
      mainImage.src = images[currentIndex];
    }

    // Initialize first image
    updateImage();

    prevBtn.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      updateImage();
    });

    nextBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateImage();
    });

    // Optional: Auto-slide every 4 seconds (you can remove this if you don’t want it)
    setInterval(() => {
      currentIndex = (currentIndex + 1) % images.length;
      updateImage();
    }, 4000);

    // ---------- TAP BUTTON REDIRECT ----------
    const tapButton = document.getElementById("tapButton");

    tapButton.addEventListener("click", () => {
      document.body.classList.add("fade-out");

      // change this to your real next page URL
      const nextPage = "letter.html";

      setTimeout(() => {
        window.location.href = nextPage;
      }, 600); // match fade duration
    });
  </script>
</body>
</html>
